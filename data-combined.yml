  UD_name: ''
  illustration: 'Kjære kunder! Vi kommer til å pusse opp butikken i uke 48 og da er vi dessverre nødt til å holde stengt i noen dager.'
  cefr_level: A2
  definitions:
    - norwegian: |
         Konstruksjonen uttrykker at situasjonen uttrykt av V har framtidsreferanse. Situasjonen kan være en intendert (planlagt) handing eller (oftest) en ukontrollerbar situasjon som taleren anser som sannsynlig.
  examples:
    - |
         Jeg kommer til å savne deg.
    - |
         Vi kommer til å lansere det nye produktet snart.
    - |
         Jeg er kvalm, jeg tror jeg kommer til å bli syk.
