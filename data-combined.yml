    - norwegian: |
         Konstruksjonen betyr å bli oppmerksom på eller observere noe. Det innebærer at man ser, hører eller på annen måte registrerer noe som kanskje ikke var åpenbart ved første øyekast. "Å legge merke til" noe betyr altså å bli bevisst på noe (X), ofte fordi det skiller seg ut eller er av spesiell interesse.
