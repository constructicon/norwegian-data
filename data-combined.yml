  definitions:
    - norwegian: |
         Konstruksjonen "å være på fornavn med noen" betyr at man har et uformelt og nært forhold til en annen person. Det antyder at man er komfortabel med å bruke fornavnet deres i stedet for mer formelle titler eller etternavn, noe som ofte indikerer en viss grad av vennskap eller fortrolighet.
