4:
  name: 'legge X på is'
  UD_name: ''
  illustration: 'På grunn av budsjettkutt måtte vi legge prosjektet på is inntil videre.'
  cefr_level: B1
  definitions:
    - norwegian: |
         Konstruksjonen "å legge noe på is" betyr å utsette eller midlertidig stoppe noe, ofte en plan eller et prosjekt. Det innebærer at man ikke går videre med det for øyeblikket, men kanskje vil ta det opp igjen senere. Det kan gjelde f. eks. prosjektarbeid, personlige planer eller forretningsbeslutninger.
  examples:
    - |
         Vi har bestemt oss for å legge bryllupsplanene på is til neste år på grunn av pandemien.
