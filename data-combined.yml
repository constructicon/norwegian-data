  UD_name: ''
  illustration: 'For det første, har vi et sterkt team. For det andre, har vi en klar strategi.'
  cefr_level: A2
  definitions:
    - norwegian: |
         Konstruksjonen brukes for å strukturere og presentere flere poeng eller argumenter i en samtale eller tekst. Det hjelper med å tydeliggjøre rekkefølgen og viktigheten av de ulike punktene som blir presentert. Ordstillingen etter de ordene "for det første": verb, subjekt, osv.
